# Workflow para compilar y desplegar el proyecto a GitHub Pages usando la rama gh-pages
name: Deploy static content to Pages

on:
  # Se ejecuta al hacer push a la rama main
  push:
    branches: ["main"]

  # Permite ejecutar el workflow manualmente desde la pestaña Actions en GitHub
  workflow_dispatch:

# Configura los permisos del GITHUB_TOKEN para permitir empujar cambios a gh-pages
permissions:
  contents: write

# Permite un solo despliegue concurrente a la vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
